name: Deploy Frontend via FTP

on:
  push:
    branches:
      - main  # Agar branch nomi 'master' bo'lsa, 'master'ga o'zgartiring

jobs:
  web-deploy:
    name: 🎉 Deploying
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: ⚙️ Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.14.0'

      - name: 🔨 Install dependencies and Build
        run: |
          npm install
          npm run build

      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/    # Vite loyihalari 'dist' papkasiga build bo'ladi
          server-dir: ./        # FTP loginingiz allaqachon ruautotrailer.ru papkasida turibdi
          protocol: ftp
          port: 21